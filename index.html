<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResumeAI — Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0e0e10;
      --surface: #18181b;
      --surface2: #222226;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #f0eff4;
      --muted: #8a8a99;
      --accent: #b19dff;
      --accent-bg: rgba(177,157,255,0.10);
      --green: #5de5a1;
      --green-bg: rgba(93,229,161,0.10);
      --amber: #ffc86b;
      --amber-bg: rgba(255,200,107,0.10);
      --red: #ff7b7b;
      --red-bg: rgba(255,123,123,0.10);
      --radius: 12px;
      --radius-sm: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: rgba(14,14,16,0.85);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--accent); }
    .header-badge {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ── Main layout ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 40px;
    }
    .hero {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeUp 0.6s ease both;
    }
    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 14px;
    }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .hero p { color: var(--muted); font-size: 16px; max-width: 480px; margin: 0 auto; }

    /* ── Input grid ── */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
      animation: fadeUp 0.6s 0.1s ease both;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--border-hover); }
    .card-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot-indicator {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* upload zone */
    .upload-zone {
      border: 1px dashed var(--border-hover);
      border-radius: var(--radius-sm);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    .upload-zone:hover { background: var(--accent-bg); border-color: var(--accent); }
    .upload-zone .u-icon { font-size: 22px; margin-bottom: 6px; }
    .upload-zone p { font-size: 13px; color: var(--muted); }
    .file-tag {
      display: none;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      background: var(--accent-bg);
      padding: 5px 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      word-break: break-all;
    }

    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 12px;
      resize: vertical;
      line-height: 1.6;
      transition: border-color 0.2s;
    }
    textarea::placeholder { color: var(--muted); }
    textarea:focus { outline: none; border-color: rgba(177,157,255,0.4); }

    /* ── Config row ── */
    .config-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 14px;
      align-items: end;
      margin-bottom: 20px;
      animation: fadeUp 0.6s 0.2s ease both;
    }
    .field label {
      display: block;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    select, input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 9px 12px;
      transition: border-color 0.2s;
      appearance: none;
    }
    select:focus, input:focus { outline: none; border-color: rgba(177,157,255,0.4); }

    .btn-analyze {
      background: var(--accent);
      color: #0e0e10;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 28px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .btn-analyze:hover { opacity: 0.88; }
    .btn-analyze:active { transform: scale(0.97); }
    .btn-analyze:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Results ── */
    #results { display: none; animation: fadeUp 0.5s ease both; }
    #results.visible { display: block; }

    .scores-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .score-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
    }
    .score-card.great::after { background: var(--green); }
    .score-card.good::after { background: var(--accent); }
    .score-card.warn::after { background: var(--amber); }
    .score-card.poor::after { background: var(--red); }
    .score-num {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }
    .score-card.great .score-num { color: var(--green); }
    .score-card.good .score-num { color: var(--accent); }
    .score-card.warn .score-num { color: var(--amber); }
    .score-card.poor .score-num { color: var(--red); }
    .score-card .score-lbl {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.75;
    }
    .summary-card strong { color: var(--text); font-weight: 500; }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .res-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }
    .res-block h3 {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
    }

    .pill-list { display: flex; flex-wrap: wrap; gap: 7px; }
    .pill {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 11px;
      border-radius: 20px;
    }
    .pill.matched { background: var(--green-bg); color: var(--green); }
    .pill.missing { background: var(--red-bg); color: var(--red); }

    .bullet-list { list-style: none; display: flex; flex-direction: column; gap: 9px; }
    .bullet-list li {
      font-size: 13px;
      color: var(--muted);
      padding-left: 18px;
      position: relative;
      line-height: 1.6;
    }
    .bullet-list li::before {
      content: '›';
      position: absolute; left: 0;
      color: var(--accent);
      font-size: 16px;
      line-height: 1.3;
    }

    /* ── Loader ── */
    .loader {
      text-align: center;
      padding: 48px;
      display: none;
    }
    .loader.visible { display: block; }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    .loader p { font-size: 13px; color: var(--muted); }

    .error-bar {
      display: none;
      background: var(--red-bg);
      border: 1px solid rgba(255,123,123,0.25);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 20px;
    }
    .error-bar.visible { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 700px) {
      main { padding: 32px 20px; }
      header { padding: 16px 20px; }
      .input-grid, .config-row, .scores-row, .results-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Resume<span>AI</span></div>
  <div class="header-badge">v1.0 · AI-Powered</div>
</header>

<main>
  <div class="hero">
    <h1>Analyze your resume<br>against <em>any job</em></h1>
    <p>Get an instant match score, skill gap analysis, and actionable improvement tips.</p>
  </div>

  <!-- Input cards -->
  <div class="input-grid">
    <div class="card">
      <div class="card-label"><span class="dot-indicator"></span>Your Resume</div>
      <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <div class="u-icon">📄</div>
        <p>Upload .txt / .pdf file</p>
      </div>
      <input type="file" id="file-input" accept=".txt,.pdf" style="display:none" onchange="handleFile(this)">
      <div id="file-tag" class="file-tag"></div>
      <textarea id="resume-text" rows="10" placeholder="Or paste your resume text here…"></textarea>
    </div>
    <div class="card">
      <div class="card-label"><span class="dot-indicator" style="background:var(--green)"></span>Job Description</div>
      <textarea id="job-desc" rows="15" placeholder="Paste the full job description here…"></textarea>
    </div>
  </div>

  <!-- Config row -->
  <div class="config-row">
    <div class="field">
      <label>AI Provider</label>
      <select id="provider" onchange="updateModelOptions()">
        <option value="claude">Anthropic (Claude)</option>
        <option value="openai">OpenAI (GPT)</option>
        <option value="backend">My FastAPI Backend</option>
      </select>
    </div>
    <div class="field">
      <label>Model</label>
      <select id="model">
        <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
        <option value="claude-opus-4-20250514">Claude Opus 4</option>
      </select>
    </div>
    <div class="field">
      <label>API Key / Backend URL</label>
      <input type="password" id="api-key" placeholder="sk-ant-... or http://localhost:8000"/>
    </div>
    <button class="btn-analyze" id="analyze-btn" onclick="analyze()">Analyze →</button>
  </div>

  <div class="error-bar" id="error-bar"></div>
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Analyzing resume against job description…</p>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="scores-row" id="scores-row"></div>
    <div class="summary-card" id="summary-card"></div>
    <div class="results-grid" id="results-grid"></div>
  </div>
</main>

<script>
  function updateModelOptions() {
    const p = document.getElementById('provider').value;
    const m = document.getElementById('model');
    const k = document.getElementById('api-key');
    const models = {
      claude: [['claude-sonnet-4-20250514','Claude Sonnet 4'],['claude-opus-4-20250514','Claude Opus 4']],
      openai: [['gpt-4o','GPT-4o'],['gpt-4o-mini','GPT-4o mini'],['gpt-4-turbo','GPT-4 Turbo']],
      backend: [['claude-sonnet-4-20250514','Claude Sonnet 4 (via backend)'],['gpt-4o','GPT-4o (via backend)']]
    };
    m.innerHTML = models[p].map(([v,l]) => `<option value="${v}">${l}</option>`).join('');
    k.placeholder = p === 'backend' ? 'http://localhost:8000' : p === 'claude' ? 'sk-ant-...' : 'sk-...';
    k.type = p === 'backend' ? 'text' : 'password';
  }

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    const tag = document.getElementById('file-tag');
    tag.style.display = 'block';
    tag.textContent = '📎 ' + file.name;
    const reader = new FileReader();
    reader.onload = e => { document.getElementById('resume-text').value = e.target.result; };
    reader.readAsText(file);
  }

  function scoreClass(n) {
    if (n >= 80) return 'great';
    if (n >= 60) return 'good';
    if (n >= 40) return 'warn';
    return 'poor';
  }

  function showError(msg) {
    const el = document.getElementById('error-bar');
    el.textContent = '⚠ ' + msg;
    el.className = 'error-bar visible';
  }
  function clearError() { document.getElementById('error-bar').className = 'error-bar'; }

  const SYSTEM = 'You are an expert resume analyzer and career coach.';
  const buildPrompt = (resume, job) => `Analyze this resume against the job description.
Return ONLY a JSON object — no markdown, no extra text:
{
  "overall_score": <0-100>,
  "match_score": <0-100>,
  "skills_score": <0-100>,
  "experience_score": <0-100>,
  "summary": "<2-3 sentences>",
  "matched_skills": ["..."],
  "missing_skills": ["..."],
  "key_experience": ["...","...","..."],
  "suggestions": ["...","...","...","..."]
}
RESUME:\n${resume}\n\nJOB DESCRIPTION:\n${job}`;

  async function callClaude(resume, job, model, apiKey) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({ model, max_tokens: 1000, system: SYSTEM, messages: [{ role: 'user', content: buildPrompt(resume, job) }] })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
  }

  async function callOpenAI(resume, job, model, apiKey) {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ model, response_format: { type: 'json_object' }, messages: [
        { role: 'system', content: SYSTEM },
        { role: 'user', content: buildPrompt(resume, job) }
      ]})
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return JSON.parse(data.choices[0].message.content);
  }

  async function callBackend(resume, job, model, baseUrl) {
    const url = baseUrl.replace(/\/$/, '') + '/analyze';
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ resume_text: resume, job_description: job, model })
    });
    if (!res.ok) throw new Error('Backend error: ' + res.status);
    return await res.json();
  }

  async function analyze() {
    clearError();
    const resume = document.getElementById('resume-text').value.trim();
    const job = document.getElementById('job-desc').value.trim();
    const provider = document.getElementById('provider').value;
    const model = document.getElementById('model').value;
    const key = document.getElementById('api-key').value.trim();
    const btn = document.getElementById('analyze-btn');

    if (!resume) { showError('Please add your resume text.'); return; }
    if (!job) { showError('Please paste a job description.'); return; }
    if (!key) { showError('Please enter your API key or backend URL.'); return; }

    btn.disabled = true;
    document.getElementById('loader').className = 'loader visible';
    document.getElementById('results').className = '';

    try {
      let result;
      if (provider === 'claude') result = await callClaude(resume, job, model, key);
      else if (provider === 'openai') result = await callOpenAI(resume, job, model, key);
      else result = await callBackend(resume, job, model, key);
      renderResults(result);
    } catch(e) {
      showError(e.message);
    }

    btn.disabled = false;
    document.getElementById('loader').className = 'loader';
  }

  function renderResults(r) {
    const labels = ['Overall Score','Job Match','Skills Fit','Experience'];
    const keys = ['overall_score','match_score','skills_score','experience_score'];
    const suffixes = ['/100','%','%','%'];

    document.getElementById('scores-row').innerHTML = keys.map((k,i) => `
      <div class="score-card ${scoreClass(r[k])}">
        <div class="score-num">${r[k]}<span style="font-size:16px;font-weight:400">${suffixes[i]}</span></div>
        <div class="score-lbl">${labels[i]}</div>
      </div>`).join('');

    document.getElementById('summary-card').innerHTML =
      `<strong>Summary — </strong>${r.summary}`;

    document.getElementById('results-grid').innerHTML = `
      <div class="res-block">
        <h3>Matched Skills</h3>
        <div class="pill-list">${(r.matched_skills||[]).map(s=>`<span class="pill matched">${s}</span>`).join('')}</div>
      </div>
      <div class="res-block">
        <h3>Missing Skills</h3>
        <div class="pill-list">${(r.missing_skills||[]).map(s=>`<span class="pill missing">${s}</span>`).join('')}</div>
      </div>
      <div class="res-block">
        <h3>Key Experience Highlights</h3>
        <ul class="bullet-list">${(r.key_experience||[]).map(e=>`<li>${e}</li>`).join('')}</ul>
      </div>
      <div class="res-block">
        <h3>Improvement Suggestions</h3>
        <ul class="bullet-list">${(r.suggestions||[]).map(s=>`<li>${s}</li>`).join('')}</ul>
      </div>`;

    document.getElementById('results').className = 'visible';
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
